<script type="text/javascript">
    function generateNodeLabel() {
        if (this.name) return this.name;
        var raw = this.topic;
        if (!raw) return this.type === 'mqtt-topic-selector-in' ? "mqtt-topic-selector-in" : "mqtt-topic-selector-out";
        
        var isComfort = (this.comfortMode === "true" || this.comfortMode === true);
        if (isComfort && this.fetchedLookup) {
            var lookup = {};
            try { lookup = JSON.parse(this.fetchedLookup); } catch(e) {}
            var lbl = raw;
            Object.keys(lookup).forEach(function(id) {
                if (lbl.includes(id)) lbl = lbl.split(id).join(lookup[id]); 
            });
            // Die fehlerhafte slash-Ersetzung wurde hier entfernt
            return lbl; 
        }
        return raw;
    }

    function setupTopicBrowser(buttonId, brokerInputId, realTopicId, visualTopicId, comfortId, topicsStorageId, lookupStorageId, labelTopicId, configDivId, toggleBtnId) {
        
        function getLabeledTopic(raw, lookup, isComfort) {
            if (!isComfort || !lookup || !raw) return raw;
            let label = raw;
            Object.keys(lookup).forEach(id => {
                if (label.includes(id)) {
                    label = label.split(id).join(lookup[id]); 
                }
            });
            // Die fehlerhafte slash-Ersetzung wurde hier entfernt
            return label;
        }

        let savedTopics = [];
        let savedLookup = {};

        try {
            savedTopics = JSON.parse($(topicsStorageId).val() || "[]");
            savedLookup = JSON.parse($(lookupStorageId).val() || "{}");
        } catch(e) {}

        function applyComfortMode() {
            let isComfort = ($(comfortId).val() === "true");
            let currentRaw = $(realTopicId).val();
            
            if (isComfort) {
                $(toggleBtnId).parent().show();
                $(labelTopicId).html('<i class="fa fa-tasks"></i> labeled Topic');
                $(visualTopicId).val(getLabeledTopic(currentRaw, savedLookup, true));
            } else {
                $(toggleBtnId).parent().hide();
                $(configDivId).hide();
                $(toggleBtnId).find("i").removeClass("fa-caret-up").addClass("fa-caret-down");
                
                $(labelTopicId).html('<i class="fa fa-tasks"></i> Topic');
                $(visualTopicId).val(currentRaw);
            }
            
            // NEU: Striktes Deduplizieren der Liste, damit nichts mehr doppelt auftaucht!
            let acData = [];
            let seenLabels = new Set();
            
            savedTopics.forEach(function(t) {
                let lbl = getLabeledTopic(t, savedLookup, isComfort);
                if (!seenLabels.has(lbl)) {
                    seenLabels.add(lbl);
                    acData.push({ label: lbl, value: t });
                }
            });
            
            $(visualTopicId).autocomplete("option", "source", acData);
        }

        // --- UI Events ---
        $(toggleBtnId).click(function(e) {
            e.preventDefault();
            var icon = $(this).find("i");
            if (icon.hasClass("fa-caret-down")) {
                icon.removeClass("fa-caret-down").addClass("fa-caret-up");
                $(configDivId).slideDown();
            } else {
                icon.removeClass("fa-caret-up").addClass("fa-caret-down");
                $(configDivId).slideUp();
            }
        });

        function updatePatternVisibility() {
            var val = $(configDivId).find('.pattern-select, .pattern-select-out').val();
            $(configDivId).find('.exact-row, .minmax-row, .custom-regex-row, .exact-row-out, .minmax-row-out, .custom-regex-row-out').hide();
            
            if (val === "exact") $(configDivId).find('.exact-row, .exact-row-out').show();
            else if (val === "minmax") $(configDivId).find('.minmax-row, .minmax-row-out').show();
            else if (val === "custom") $(configDivId).find('.custom-regex-row, .custom-regex-row-out').show();
        }
        $(configDivId).find('.pattern-select, .pattern-select-out').change(updatePatternVisibility);
        updatePatternVisibility(); 

        // --- Autocomplete ---
        $(visualTopicId).autocomplete({
            minLength: 0,
            source: [], 
            select: function(event, ui) {
                $(realTopicId).val(ui.item.value); 
                $(visualTopicId).val(ui.item.label);
                return false; 
            },
            focus: function(event, ui) {
                $(visualTopicId).val(ui.item.label);
                return false;
            }
        });

        $(visualTopicId).click(function() { $(this).autocomplete("search", ""); });

        $(visualTopicId).on('blur', function() {
            if ($(comfortId).val() === "true") {
                let currentRaw = $(realTopicId).val();
                $(this).val(getLabeledTopic(currentRaw, savedLookup, true));
            }
        });

        $(visualTopicId).on('input', function() {
            if ($(comfortId).val() !== "true") {
                $(realTopicId).val($(this).val());
            }
        });

        applyComfortMode();
        $(comfortId).change(function() { applyComfortMode(); });

        // --- AJAX Request ---
        $(buttonId).click(function() {
            var brokerId = $(brokerInputId).val();
            if(!brokerId || brokerId === "_ADD_") {
                RED.notify("Bitte Broker wählen und deployen.", "warning");
                return;
            }
            var btn = $(this);
            var originalText = btn.html();
            btn.html('<i class="fa fa-spinner fa-spin"></i> Listen...');
            btn.prop('disabled', true);

            var reqData = { 
                broker: brokerId,
                idPattern: $(configDivId).find('.pattern-select, .pattern-select-out').val(),
                idLengthExact: $(configDivId).find('.id-length-exact, .id-length-exact-out').val(),
                idLengthMin: $(configDivId).find('.id-length-min, .id-length-min-out').val(),
                idLengthMax: $(configDivId).find('.id-length-max, .id-length-max-out').val(),
                idRegex: $(configDivId).find('.custom-regex-input, .custom-regex-input-out').val(),
                nameSuffix: $(configDivId).find('.name-suffix-input, .name-suffix-input-out').val(),
                nameKeys: $(configDivId).find('.name-keys-input, .name-keys-input-out').val()
            };

            $.ajax({
                url: '/mqtt-browse',
                type: 'GET',
                data: reqData, 
                success: function(data) {
                    btn.html(originalText);
                    btn.prop('disabled', false);

                    if(data.topics && data.topics.length > 0) {
                        savedTopics = data.topics;
                        savedLookup = data.lookup || {};

                        $(topicsStorageId).val(JSON.stringify(savedTopics));
                        $(lookupStorageId).val(JSON.stringify(savedLookup));

                        applyComfortMode();
                        $(visualTopicId).autocomplete("search", "");

                        RED.notify(data.topics.length + " Topics empfangen.", "success");
                    } else {
                        RED.notify("Keine Topics gefunden.", "info");
                    }
                },
                error: function() {
                    btn.html(originalText);
                    btn.prop('disabled', false);
                    RED.notify("Fehler beim Browsen.", "error");
                }
            });
        });
    }

    // --- INPUT NODE REGISTRIERUNG ---
    RED.nodes.registerType('mqtt-topic-selector-in',{
        category: 'network',
        defaults: {
            name: {value:""},
            topic: {value:"", required:true}, 
            qos: {value: "0"},
            broker: {type:"mqtt-broker", required:true},
            comfortMode: {value: "true"}, 
            idPattern: {value: "exact"},
            idLengthExact: {value: 32},
            idLengthMin: {value: 10},
            idLengthMax: {value: 40},
            idRegex: {value: "^[a-zA-Z0-9\\-_]{32}$"},
            nameSuffix: {value: "/announce"},
            nameKeys: {value: "name,title,deviceName"},
            fetchedTopics: {value: "[]"},
            fetchedLookup: {value: "{}"}
        },
        color:"#d8bfd8",
        inputs:0,
        outputs:1,
        icon: "bridge.svg",
        label: generateNodeLabel,
        labelStyle: function() { return this.name ? "node_label_italic" : ""; },
        oneditprepare: function() {
            if (!this.idPattern) $("#node-input-idPattern").val("exact");
            if (!this.idLengthExact) $("#node-input-idLengthExact").val(32);
            if (!this.idLengthMin) $("#node-input-idLengthMin").val(10);
            if (!this.idLengthMax) $("#node-input-idLengthMax").val(40);
            if (!this.nameSuffix) $("#node-input-nameSuffix").val("/announce");
            if (!this.nameKeys) $("#node-input-nameKeys").val("name,title,deviceName");

            setupTopicBrowser('#node-browse-button-in', '#node-input-broker', '#node-input-topic', '#node-input-topicVisual', '#node-input-comfortMode', '#node-input-fetchedTopics', '#node-input-fetchedLookup', '#label-topic-in', '#comfort-settings-in', '#advanced-toggle-in');
        }
    });

    // --- OUTPUT NODE REGISTRIERUNG ---
    RED.nodes.registerType('mqtt-topic-selector-out',{
        category: 'network',
        defaults: {
            name: {value:""},
            topic: {value:"", required:true}, 
            qos: {value: "0"},
            retain: {value: "false"},
            broker: {type:"mqtt-broker", required:true},
            comfortMode: {value: "true"},
            idPattern: {value: "exact"},
            idLengthExact: {value: 32},
            idLengthMin: {value: 10},
            idLengthMax: {value: 40},
            idRegex: {value: "^[a-zA-Z0-9\\-_]{32}$"},
            nameSuffix: {value: "/announce"},
            nameKeys: {value: "name,title,deviceName"},
            fetchedTopics: {value: "[]"},
            fetchedLookup: {value: "{}"}
        },
        color:"#d8bfd8",
        inputs:1,
        outputs:0,
        icon: "bridge.svg",
        align: "right",
        label: generateNodeLabel,
        labelStyle: function() { return this.name ? "node_label_italic" : ""; },
        oneditprepare: function() {
            if (!this.idPattern) $("#node-input-idPattern").val("exact");
            if (!this.idLengthExact) $("#node-input-idLengthExact").val(32);
            if (!this.idLengthMin) $("#node-input-idLengthMin").val(10);
            if (!this.idLengthMax) $("#node-input-idLengthMax").val(40);
            if (!this.nameSuffix) $("#node-input-nameSuffix").val("/announce");
            if (!this.nameKeys) $("#node-input-nameKeys").val("name,title,deviceName");

            setupTopicBrowser('#node-browse-button-out', '#node-input-broker', '#node-input-topic', '#node-input-topicVisual', '#node-input-comfortModeOut', '#node-input-fetchedTopics', '#node-input-fetchedLookup', '#label-topic-out', '#comfort-settings-out', '#advanced-toggle-out');
        }
    });
</script>

<script type="text/html" data-help-name="mqtt-topic-selector-in">
    <p><b>MQTT Topic Selector (Input)</b></p>
    <p>Connects to an MQTT broker and subscribes to messages from the specified topic. Includes advanced comfort features for device name mapping and topic browsing.</p>
    <ul>
        <li><b>Broker</b>: MQTT broker connection (required)</li>
        <li><b>Topic</b>: Topic to subscribe to (supports wildcards, required)</li>
        <li><b>QoS</b>: Quality of Service (0, 1, 2)</li>
        <li><b>Comfort</b>: Enables device name mapping (Comfort Mode)</li>
        <li><b>Recognition</b>: ID recognition type (exact, min/max, regex)</li>
        <li><b>Info-Topic</b>: Suffix for info topics (default: /announce)</li>
        <li><b>JSON Keys</b>: Fields to extract device names (default: name,title,deviceName)</li>
    </ul>
    <p><b>Outputs</b>:</p>
    <ul>
        <li><b>payload</b>: string | buffer – message payload</li>
        <li><b>topic</b>: string – MQTT topic</li>
        <li><b>qos</b>: number – Quality of Service</li>
        <li><b>retain</b>: boolean – Retain flag</li>
        <li><b>responseTopic</b>: string – MQTTv5 response topic</li>
        <li><b>correlationData</b>: Buffer – MQTTv5 correlation data</li>
        <li><b>contentType</b>: string – MQTTv5 content type</li>
        <li><b>userProperties</b>: object – MQTTv5 user properties</li>
        <li><b>messageExpiryInterval</b>: number – MQTTv5 expiry time (seconds)</li>
    </ul>
    <p><b>Comfort Mode</b>: Automatically maps cryptic device IDs to readable names using info topics and JSON keys. Use the <b>Listen</b> button to browse available topics and build the mapping.</p>
    <p><b>Status</b>: Shows connection state and errors (e.g., connected, error, no broker).</p>
    <p><b>Dynamic Subscription</b>: When enabled, the node can be controlled by input messages (actions: connect, disconnect, getSubscriptions, subscribe, unsubscribe).</p>
    <p>See the README for more details and examples.</p>
</script>

<script type="text/html" data-help-name="mqtt-topic-selector-out">
    <p><b>MQTT Topic Selector (Output)</b></p>
    <p>Connects to an MQTT broker and publishes messages to the specified topic. Includes advanced comfort features for device name mapping and topic browsing.</p>
    <ul>
        <li><b>Broker</b>: MQTT broker connection (required)</li>
        <li><b>Topic</b>: Topic to publish to (required)</li>
        <li><b>QoS</b>: Quality of Service (0, 1, 2)</li>
        <li><b>Retain</b>: Retain flag (true/false)</li>
        <li><b>Comfort</b>: Enables device name mapping (Comfort Mode)</li>
        <li><b>Recognition</b>: ID recognition type (exact, min/max, regex)</li>
        <li><b>Info-Topic</b>: Suffix for info topics (default: /announce)</li>
        <li><b>JSON Keys</b>: Fields to extract device names (default: name,title,deviceName)</li>
    </ul>
    <p><b>Inputs</b>:</p>
    <ul>
        <li><b>payload</b>: string | buffer – message payload to publish</li>
        <li><b>topic</b>: string – MQTT topic (overrides configured topic)</li>
        <li><b>qos</b>: number – Quality of Service (overrides configured QoS)</li>
        <li><b>retain</b>: boolean – Retain flag (overrides configured retain)</li>
        <li><b>responseTopic</b>: string – MQTTv5 response topic</li>
        <li><b>correlationData</b>: Buffer – MQTTv5 correlation data</li>
        <li><b>contentType</b>: string – MQTTv5 content type</li>
        <li><b>userProperties</b>: object – MQTTv5 user properties</li>
        <li><b>messageExpiryInterval</b>: number – MQTTv5 expiry time (seconds)</li>
        <li><b>topicAlias</b>: number – MQTTv5 topic alias</li>
    </ul>
    <p><b>Comfort Mode</b>: Automatically maps cryptic device IDs to readable names using info topics and JSON keys. Use the <b>Listen</b> button to browse available topics and build the mapping.</p>
    <p><b>Status</b>: Shows connection state and errors (e.g., connected, error, no broker).</p>
    <p><b>Dynamic Control</b>: The node can be controlled by input messages (actions: connect, disconnect).</p>
    <p>See the README for more details and examples.</p>
</script>
